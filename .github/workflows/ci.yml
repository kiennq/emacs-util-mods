name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  zig-tests:
    name: Zig tests (${{ matrix.module }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            module: dyn-loader
          - os: windows-latest
            module: dyn-loader
          - os: windows-latest
            module: conpty

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run Zig tests
        shell: pwsh
        run: |
          $moduleDir = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'src') '${{ matrix.module }}'
          $buildFile = Join-Path $moduleDir 'build.zig'
          zig build --build-file $buildFile -Doptimize=ReleaseSafe test

  smoke-load:
    name: ${{ matrix.module }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            module: dyn-loader
            binary_name: dyn-loader-module.so
            feature: dyn-loader-module
          - os: windows-latest
            module: dyn-loader
            binary_name: dyn-loader-module.dll
            feature: dyn-loader-module
          - os: windows-latest
            module: conpty
            binary_name: conpty-module.dll
            feature: conpty-module

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Emacs (Unix)
        if: runner.os != 'Windows'
        uses: purcell/setup-emacs@master
        with:
          version: 29.4

      - name: Setup Emacs (Windows)
        if: runner.os == 'Windows'
        uses: jcs090218/setup-emacs@master
        with:
          version: 29.4

      - name: Build module
        shell: pwsh
        run: |
          $moduleDir = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'src') '${{ matrix.module }}'
          $buildFile = Join-Path $moduleDir 'build.zig'
          zig build --build-file $buildFile -Doptimize=ReleaseSafe install

      - name: Build dyn-loader fixtures
        if: matrix.module == 'dyn-loader'
        shell: pwsh
        run: |
          $fixtureDir = Join-Path $env:RUNNER_TEMP 'dyn-loader-fixtures'
          $script = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'test') 'build-dyn-loader-fixtures.ps1'
          & $script -OutputDir $fixtureDir

      - name: Verify dyn-loader lifecycle in Emacs
        if: matrix.module == 'dyn-loader'
        shell: pwsh
        run: |
          $moduleDir = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'src') '${{ matrix.module }}'
          $modulePath = Join-Path (Join-Path (Join-Path $moduleDir 'zig-out') 'bin') '${{ matrix.binary_name }}'
          $fixtureDir = Join-Path $env:RUNNER_TEMP 'dyn-loader-fixtures'
          $extension = [System.IO.Path]::GetExtension($modulePath)
          $manifestPath = Join-Path $fixtureDir 'fixture-manifest.json'
          $livePath = Join-Path $fixtureDir "fixture-live$extension"
          $v2Path = Join-Path $fixtureDir "fixture-v2$extension"
          $v3Path = Join-Path $fixtureDir "fixture-v3$extension"
          $testFile = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'test') 'dyn-loader-lifecycle.el'
          emacs --batch -Q -l $testFile -- $modulePath $manifestPath $livePath $v2Path $v3Path

      - name: Smoke-load module in Emacs
        if: matrix.module != 'dyn-loader'
        shell: pwsh
        run: |
          $moduleDir = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'src') '${{ matrix.module }}'
          $modulePath = Join-Path (Join-Path (Join-Path $moduleDir 'zig-out') 'bin') '${{ matrix.binary_name }}'
          $testFile = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'test') 'smoke-load.el'
          emacs --batch -Q -l $testFile -- $modulePath '${{ matrix.feature }}'
