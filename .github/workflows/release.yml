name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional tag to publish. Leave empty to create a weekly prerelease tag.
        required: false
        type: string
      release_name:
        description: Optional display name for the release.
        required: false
        type: string
  schedule:
    - cron: '0 7 * * 1'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      latest_tag: ${{ steps.plan.outputs.latest_tag }}
      prerelease: ${{ steps.plan.outputs.prerelease }}
      release_name: ${{ steps.plan.outputs.release_name }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      should_release: ${{ steps.plan.outputs.should_release }}
      skip_reason: ${{ steps.plan.outputs.skip_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to publish
        id: plan
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_NAME: ${{ github.event.inputs.release_name || '' }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          latest_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          weekly_stamp="$(date -u +'%Y%m%d')"
          weekly_tag="weekly-${weekly_stamp}-${SHA:0:7}"

          should_release=true
          prerelease=false
          release_tag=''
          release_name=''
          skip_reason=''

          if [[ "$EVENT_NAME" == 'push' ]]; then
            release_tag="$REF_NAME"
            release_name="${INPUT_RELEASE_NAME:-$release_tag}"
          elif [[ -n "$INPUT_RELEASE_TAG" ]]; then
            release_tag="$INPUT_RELEASE_TAG"
            release_name="${INPUT_RELEASE_NAME:-$release_tag}"
          else
            release_tag="$weekly_tag"
            release_name="${INPUT_RELEASE_NAME:-Weekly prerelease ${weekly_stamp}}"
            prerelease=true
 
            if [[ "$EVENT_NAME" == 'schedule' ]] && [[ -n "$latest_tag" ]] && git diff --quiet "$latest_tag"..HEAD -- .; then
              should_release=false
              skip_reason="No tracked file changes since $latest_tag"
            fi
          fi

          {
            echo "latest_tag=$latest_tag"
            echo "prerelease=$prerelease"
            echo "release_name=$release_name"
            echo "release_tag=$release_tag"
            echo "should_release=$should_release"
            echo "skip_reason=$skip_reason"
          } >> "$GITHUB_OUTPUT"

      - name: Report skipped weekly release
        if: steps.plan.outputs.should_release != 'true'
        run: echo "${{ steps.plan.outputs.skip_reason }}"

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    name: ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            module: dyn-loader
            binary_name: dyn-loader-module.so
            feature: dyn-loader-module
            asset_name: dyn-loader-linux-x86_64
          - os: windows-latest
            module: dyn-loader
            binary_name: dyn-loader-module.dll
            feature: dyn-loader-module
            asset_name: dyn-loader-windows-x86_64
          - os: windows-latest
            module: conpty
            binary_name: conpty-module.dll
            feature: conpty-module
            asset_name: conpty-windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Emacs (Unix)
        if: runner.os != 'Windows'
        uses: purcell/setup-emacs@master
        with:
          version: 29.4

      - name: Setup Emacs (Windows)
        if: runner.os == 'Windows'
        uses: jcs090218/setup-emacs@master
        with:
          version: 29.4

      - name: Build module
        shell: pwsh
        run: |
          $moduleDir = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'src') '${{ matrix.module }}'
          $buildFile = Join-Path $moduleDir 'build.zig'
          zig build --build-file $buildFile -Doptimize=ReleaseSafe install

      - name: Smoke-load module in Emacs
        shell: pwsh
        run: |
          $moduleDir = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'src') '${{ matrix.module }}'
          $modulePath = Join-Path (Join-Path (Join-Path $moduleDir 'zig-out') 'bin') '${{ matrix.binary_name }}'
          $testFile = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'test') 'smoke-load.el'
          emacs --batch -Q -l $testFile -- $modulePath '${{ matrix.feature }}'

      - name: Package asset
        shell: pwsh
        run: |
          $moduleDir = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'src') '${{ matrix.module }}'
          $modulePath = Join-Path (Join-Path (Join-Path $moduleDir 'zig-out') 'bin') '${{ matrix.binary_name }}'
          $stageDir = Join-Path $env:RUNNER_TEMP '${{ matrix.asset_name }}'
          $zipPath = Join-Path $env:GITHUB_WORKSPACE '${{ matrix.asset_name }}.zip'

          Remove-Item $stageDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $stageDir | Out-Null

          Copy-Item $modulePath (Join-Path $stageDir '${{ matrix.binary_name }}')
          Copy-Item (Join-Path $moduleDir 'README.md') (Join-Path $stageDir 'README.md')
          Copy-Item (Join-Path $env:GITHUB_WORKSPACE 'LICENSE') (Join-Path $stageDir 'LICENSE')

          Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path (Join-Path $stageDir '*') -DestinationPath $zipPath

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.zip

  publish:
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: '*'
          merge-multiple: true

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: release-assets/*.zip
          generateReleaseNotes: true
          name: ${{ needs.prepare.outputs.release_name }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          replacesArtifacts: true
          tag: ${{ needs.prepare.outputs.release_tag }}
