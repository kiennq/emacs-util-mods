name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'
  push:
    branches:
      - main
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.plan.outputs.version }}
      latest_tag: ${{ steps.plan.outputs.latest_tag }}
      release_name: ${{ steps.plan.outputs.release_name }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      should_release: ${{ steps.plan.outputs.should_release }}
      skip_reason: ${{ steps.plan.outputs.skip_reason }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to publish
        id: plan
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          latest_tag="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          base_version="$(tr -d '[:space:]' < VERSION)"
          short_sha="${SHA:0:7}"
          version="${base_version}.${RUN_NUMBER}.${short_sha}"
          release_tag="v${version}"
          release_name="${version}"

          should_release=true
          skip_reason=''

          if [[ "$EVENT_NAME" == 'schedule' ]] && [[ -n "$latest_tag" ]] && git diff --quiet "$latest_tag"..HEAD -- .; then
            should_release=false
            skip_reason="No tracked file changes since $latest_tag"
          fi

          {
            echo "version=$version"
            echo "latest_tag=$latest_tag"
            echo "release_name=$release_name"
            echo "release_tag=$release_tag"
            echo "should_release=$should_release"
            echo "skip_reason=$skip_reason"
          } >> "$GITHUB_OUTPUT"

      - name: Report skipped weekly release
        if: steps.plan.outputs.should_release != 'true'
        run: echo "${{ steps.plan.outputs.skip_reason }}"

      - name: Create or update release shell
        if: steps.plan.outputs.should_release == 'true'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          generateReleaseNotes: true
          name: ${{ steps.plan.outputs.release_name }}
          prerelease: false
          replacesArtifacts: true
          tag: ${{ steps.plan.outputs.release_tag }}

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    name: ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            module: dyn-loader
            binary_name: dyn-loader-module.so
            arch: x86_64
            asset_name: dyn-loader-module-x86_64.so
          - os: windows-latest
            module: dyn-loader
            binary_name: dyn-loader-module.dll
            arch: x86_64
            asset_name: dyn-loader-module-x86_64.dll
          - os: windows-latest
            module: conpty
            binary_name: conpty-module.dll
            arch: x86_64
            asset_name: conpty-module-x86_64.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Restore Zig caches
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache/global
            src/${{ matrix.module }}/.zig-cache
          key: release-zig-${{ runner.os }}-${{ matrix.module }}-${{ matrix.arch }}-0.15.2-${{ hashFiles('VERSION', 'build.zig', 'src/**') }}
          restore-keys: |
            release-zig-${{ runner.os }}-${{ matrix.module }}-${{ matrix.arch }}-0.15.2-

      - name: Build module
        shell: pwsh
        run: |
          $moduleDir = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'src') '${{ matrix.module }}'
          $buildFile = Join-Path $moduleDir 'build.zig'
          $globalCacheDir = Join-Path (Join-Path $env:GITHUB_WORKSPACE '.zig-cache') 'global'
          $localCacheDir = Join-Path $moduleDir '.zig-cache'
          zig build --build-file $buildFile `
            --global-cache-dir $globalCacheDir `
            --cache-dir $localCacheDir `
            -Doptimize=ReleaseFast `
            install

      - name: Stage release artifact
        id: stage
        shell: pwsh
        run: |
          $moduleDir = Join-Path (Join-Path $env:GITHUB_WORKSPACE 'src') '${{ matrix.module }}'
          $modulePath = Join-Path (Join-Path (Join-Path $moduleDir 'zig-out') 'bin') '${{ matrix.binary_name }}'
          $artifactDir = Join-Path $env:RUNNER_TEMP 'release-assets'
          $artifactPath = Join-Path $artifactDir '${{ matrix.asset_name }}'
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          Copy-Item -Path $modulePath -Destination $artifactPath -Force
          "artifact_path=$artifactPath" >> $env:GITHUB_OUTPUT

      - name: Publish module binary
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: ${{ steps.stage.outputs.artifact_path }}
          omitBodyDuringUpdate: true
          omitDraftDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          tag: ${{ needs.prepare.outputs.release_tag }}
